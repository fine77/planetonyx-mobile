name: planetonyx-mobile-syncthing-android

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Syncthing-Fork Android version (example: 2.0.15.0)"
        required: true
        default: "2.0.15.0"
      precheck_only:
        description: "Run only fast prechecks (no full Gradle build)"
        required: false
        default: "false"

jobs:
  build-sign-publish:
    runs-on: ubuntu-latest
    env:
      SYNCTHING_ANDROID_VERSION: ${{ github.event.inputs.version }}
      PRECHECK_ONLY: ${{ github.event.inputs.precheck_only || 'false' }}
      SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
      SIGNING_KEYSTORE_PASS: ${{ secrets.SIGNING_KEYSTORE_PASS }}
      SIGNING_KEY_PASS: ${{ secrets.SIGNING_KEY_PASS }}
      APPSTORE_BASE_URL: https://appstore.srv.planetonyx.net
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync

      - name: Setup Java 11 (Syncthing Android compatibility)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Install Android build-tools (apksigner)
        run: |
          sudo apt-get install -y zipalign apksigner || true

      - name: Materialize signing files from secrets
        run: |
          test -n "${{ secrets.SIGNING_KEYSTORE_B64 }}"
          echo "${{ secrets.SIGNING_KEYSTORE_B64 }}" | base64 -d > /tmp/planetonyx-release.keystore
          chmod 600 /tmp/planetonyx-release.keystore
          echo "SIGNING_KEYSTORE_PATH=/tmp/planetonyx-release.keystore" >> "$GITHUB_ENV"
          if [ -n "${{ secrets.DETACHED_SIGN_KEY_B64 }}" ]; then
            echo "${{ secrets.DETACHED_SIGN_KEY_B64 }}" | base64 -d > /tmp/planetonyx-detached-sign.pem
            chmod 600 /tmp/planetonyx-detached-sign.pem
            echo "DETACHED_SIGN_KEY_PATH=/tmp/planetonyx-detached-sign.pem" >> "$GITHUB_ENV"
          fi

      - name: Run Syncthing Android pipeline
        working-directory: mobile-app-store
        run: |
          chmod +x scripts/build_syncthing_android.sh
          ./scripts/build_syncthing_android.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: syncthing-android-${{ github.event.inputs.version }}
          path: |
            mobile-app-store/dist/syncthing-android/${{ github.event.inputs.version }}/
            mobile-app-store/metadata/index.json
