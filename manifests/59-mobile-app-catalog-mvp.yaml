apiVersion: v1
kind: ConfigMap
metadata:
  name: app-catalog-config
  namespace: mobile-ota
data:
  index.json: |
    {
      "generated_at": "2026-03-26T00:00:00Z",
      "store_version": "1.0",
      "apps": [
        {
          "id": "florisboard",
          "name": "FlorisBoard",
          "channel": "stable",
          "version": "0.4.8",
          "artifact_url": "https://appstore.srv.planetonyx.net/artifacts/apps/florisboard/0.4.8/florisboard.apk",
          "sha256": "2a10b0ca53569101f053db02a6424f69999a4776c5ea2c4ee4992bc996d62cbf",
          "signature_url": "https://appstore.srv.planetonyx.net/artifacts/apps/florisboard/0.4.8/florisboard.apk.sig",
          "source_repo": "https://github.com/florisboard/florisboard",
          "license": "Apache-2.0",
          "maintainer_mode": "upstream"
        },
        {
          "id": "lawnchair",
          "name": "Lawnchair",
          "channel": "stable",
          "version": "14.0.0",
          "artifact_url": "https://appstore.srv.planetonyx.net/artifacts/apps/lawnchair/14.0.0/lawnchair.apk",
          "sha256": "97e81ce1cb7912070cd2142627b7f0bb491b900b3f8a815c2d3221bf09bf3a7e",
          "signature_url": "https://appstore.srv.planetonyx.net/artifacts/apps/lawnchair/14.0.0/lawnchair.apk.sig",
          "source_repo": "https://github.com/LawnchairLauncher/lawnchair",
          "license": "GPL-3.0",
          "maintainer_mode": "upstream"
        }
      ]
    }
  server.py: |
    import json
    from datetime import datetime, timezone
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer
    from pathlib import Path
    from urllib.parse import unquote, urlparse

    BASE = Path("/config")
    INDEX = BASE / "index.json"
    DATA_INDEX = Path("/data/metadata/index.json")
    REPORTS = Path("/data/reports")
    REPORTS.mkdir(parents=True, exist_ok=True)
    ARTIFACTS = Path("/data/artifacts")
    DATA_INDEX.parent.mkdir(parents=True, exist_ok=True)

    def _load_json(path):
      if not path.exists():
        return None
      try:
        with path.open("r", encoding="utf-8") as f:
          payload = json.load(f)
        if isinstance(payload, dict):
          return payload
      except Exception:
        return None
      return None

    def load_index():
      # Prefer mutable index on PVC so CI publishes are live without ConfigMap rewrite.
      data_idx = _load_json(DATA_INDEX)
      if isinstance(data_idx, dict):
        return data_idx
      cfg_idx = _load_json(INDEX)
      if isinstance(cfg_idx, dict):
        return cfg_idx
      return {"generated_at": datetime.now(timezone.utc).isoformat(), "store_version": "1.0", "apps": []}

    class Handler(BaseHTTPRequestHandler):
      server_version = "planetonyx-mobile-app-catalog/1.0"

      def _send_json(self, code, body):
        raw = json.dumps(body, ensure_ascii=True).encode("utf-8")
        self.send_response(code)
        self.send_header("Content-Type", "application/json")
        self.send_header("Content-Length", str(len(raw)))
        self.end_headers()
        self.wfile.write(raw)

      def _send_file(self, path, content_type):
        if not path.exists() or not path.is_file():
          self._send_json(404, {"ok": False, "error": "file_not_found"})
          return
        raw = path.read_bytes()
        self.send_response(200)
        self.send_header("Content-Type", content_type)
        self.send_header("Content-Length", str(len(raw)))
        self.end_headers()
        self.wfile.write(raw)

      @staticmethod
      def _safe_resolve(base, rel):
        cleaned = rel.lstrip("/")
        candidate = (base / cleaned).resolve()
        try:
          candidate.relative_to(base.resolve())
        except Exception:
          return None
        return candidate

      def log_message(self, fmt, *args):
        return

      def do_GET(self):
        parsed = urlparse(self.path)
        if parsed.path.startswith("/artifacts/"):
          rel = unquote(parsed.path.removeprefix("/artifacts/"))
          fp = self._safe_resolve(ARTIFACTS, rel)
          if fp is None:
            self._send_json(400, {"ok": False, "error": "invalid_artifact_path"})
            return
          ctype = "application/octet-stream"
          if str(fp).endswith(".sig"):
            ctype = "text/plain; charset=utf-8"
          self._send_file(fp, ctype)
          return
        if parsed.path == "/healthz":
          self._send_json(200, {"ok": True, "service": "planetonyx-mobile-app-catalog-api"})
          return
        if parsed.path == "/v1/catalog/index":
          self._send_json(200, {"ok": True, "catalog": load_index()})
          return
        if parsed.path.startswith("/v1/catalog/app/"):
          app_id = parsed.path.rsplit("/", 1)[-1].strip()
          idx = load_index()
          apps = idx.get("apps") if isinstance(idx.get("apps"), list) else []
          for app in apps:
            if isinstance(app, dict) and str(app.get("id") or "").strip() == app_id:
              self._send_json(200, {"ok": True, "app": app})
              return
          self._send_json(404, {"ok": False, "error": "app_not_found", "id": app_id})
          return
        self._send_json(404, {"ok": False, "error": "not_found"})

    def main():
      srv = ThreadingHTTPServer(("0.0.0.0", 8081), Handler)
      srv.serve_forever()

    if __name__ == "__main__":
      main()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-catalog-api
  namespace: mobile-ota
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-catalog-api
  template:
    metadata:
      labels:
        app: app-catalog-api
    spec:
      containers:
        - name: app-catalog-api
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-lc"]
          args:
            - "python /config/server.py"
          ports:
            - containerPort: 8081
              name: http
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: artifacts
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
      volumes:
        - name: config
          configMap:
            name: app-catalog-config
        - name: artifacts
          persistentVolumeClaim:
            claimName: ota-artifacts-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: app-catalog-api
  namespace: mobile-ota
spec:
  selector:
    app: app-catalog-api
  ports:
    - name: http
      port: 8081
      targetPort: http
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: app-catalog-srv
  namespace: mobile-ota
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`appstore.srv.planetonyx.net`)
      kind: Rule
      services:
        - name: app-catalog-api
          port: 8081
  tls:
    secretName: wildcard-srv-planetonyx-net-tls
