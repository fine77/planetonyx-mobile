apiVersion: v1
kind: ConfigMap
metadata:
  name: ota-api-config
  namespace: mobile-ota
data:
  policy.json: |
    {
      "default_min_battery_percent": 40,
      "requires_charging": true,
      "allow_devices": ["avicii"],
      "channels": ["canary", "beta", "stable"]
    }
  manifests.json: |
    {
      "avicii": {
        "stable": {
          "current_target": "2026.03.26",
          "version_name": "0.2.3",
          "artifact_url": "https://ota.srv.planetonyx.net/artifacts/avicii/stable/2026.03.26/update.zip",
          "sha256": "9aa5f3446d61abc3d7f55c4c0041f02d08a1850d0d011bdf897d8e990247ba48",
          "size_bytes": 33,
          "signature_url": "https://ota.srv.planetonyx.net/artifacts/avicii/stable/2026.03.26/update.zip.sig",
          "changelog_url": "https://ota.srv.planetonyx.net/changelog/avicii/2026.03.26.md",
          "rollout_percent": 10,
          "hold": false
        }
      }
    }
  server.py: |
    import json
    from datetime import datetime, timezone
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer
    from pathlib import Path
    from urllib.parse import parse_qs, unquote, urlparse

    BASE = Path("/config")
    POLICY = BASE / "policy.json"
    MANIFESTS = BASE / "manifests.json"
    REPORTS = Path("/data/reports")
    REPORTS.mkdir(parents=True, exist_ok=True)
    ARTIFACTS = Path("/data/artifacts")
    CHANGELOG = Path("/data/changelog")

    def load_json(path: Path):
      try:
        with path.open("r", encoding="utf-8") as f:
          payload = json.load(f)
        return payload if isinstance(payload, dict) else {}
      except Exception:
        return {}

    class Handler(BaseHTTPRequestHandler):
      server_version = "planetonyx-mobile-ota/1.0"

      def _send_json(self, code: int, body: dict):
        raw = json.dumps(body, ensure_ascii=True).encode("utf-8")
        self.send_response(code)
        self.send_header("Content-Type", "application/json")
        self.send_header("Content-Length", str(len(raw)))
        self.end_headers()
        self.wfile.write(raw)

      def _send_file(self, path: Path, content_type: str):
        if not path.exists() or not path.is_file():
          self._send_json(404, {"ok": False, "error": "file_not_found"})
          return
        raw = path.read_bytes()
        self.send_response(200)
        self.send_header("Content-Type", content_type)
        self.send_header("Content-Length", str(len(raw)))
        self.end_headers()
        self.wfile.write(raw)

      @staticmethod
      def _safe_resolve(base: Path, rel: str):
        cleaned = rel.lstrip("/")
        candidate = (base / cleaned).resolve()
        try:
          candidate.relative_to(base.resolve())
        except Exception:
          return None
        return candidate

      def log_message(self, fmt, *args):
        return

      def do_GET(self):
        parsed = urlparse(self.path)
        if parsed.path.startswith("/artifacts/"):
          rel = unquote(parsed.path.removeprefix("/artifacts/"))
          fp = self._safe_resolve(ARTIFACTS, rel)
          if fp is None:
            self._send_json(400, {"ok": False, "error": "invalid_artifact_path"})
            return
          ctype = "application/octet-stream"
          if str(fp).endswith(".sig"):
            ctype = "text/plain; charset=utf-8"
          self._send_file(fp, ctype)
          return
        if parsed.path.startswith("/changelog/"):
          rel = unquote(parsed.path.removeprefix("/changelog/"))
          fp = self._safe_resolve(CHANGELOG, rel)
          if fp is None:
            self._send_json(400, {"ok": False, "error": "invalid_changelog_path"})
            return
          self._send_file(fp, "text/markdown; charset=utf-8")
          return
        if parsed.path == "/healthz":
          self._send_json(200, {"ok": True, "service": "planetonyx-mobile-ota-api"})
          return
        if parsed.path != "/v1/ota/check":
          self._send_json(404, {"ok": False, "error": "not_found"})
          return

        q = parse_qs(parsed.query)
        device = (q.get("device", [""])[0] or "").strip()
        channel = (q.get("channel", ["stable"])[0] or "stable").strip()
        current = (q.get("build", [""])[0] or "").strip()

        policy = load_json(POLICY)
        manifests = load_json(MANIFESTS)
        if device not in (policy.get("allow_devices") or []):
          self._send_json(403, {"ok": False, "error": "device_not_allowed"})
          return

        target = ((manifests.get(device) or {}).get(channel) or {})
        if not target:
          self._send_json(
            200,
            {
              "ok": True,
              "update_available": False,
              "device": device,
              "channel": channel,
              "current_build": current,
              "reason": "no_target_manifest"
            },
          )
          return

        target_build = str(target.get("current_target") or "").strip()
        if not target_build or target_build == current:
          self._send_json(
            200,
            {
              "ok": True,
              "update_available": False,
              "device": device,
              "channel": channel,
              "current_build": current
            },
          )
          return

        self._send_json(
          200,
          {
            "ok": True,
            "update_available": True,
            "device": device,
            "channel": channel,
            "target_build": target_build,
            "version_name": target.get("version_name"),
            "artifact_url": target.get("artifact_url"),
            "sha256": target.get("sha256"),
            "size_bytes": target.get("size_bytes"),
            "signature_url": target.get("signature_url"),
            "changelog_url": target.get("changelog_url"),
            "rollout": {
              "ring": channel,
              "percent": int(target.get("rollout_percent") or 0),
              "hold": bool(target.get("hold", False)),
            },
            "policy": {
              "min_battery_percent": int(policy.get("default_min_battery_percent") or 40),
              "requires_charging": bool(policy.get("requires_charging", True)),
            },
          },
        )

      def do_POST(self):
        if self.path != "/v1/ota/report":
          self._send_json(404, {"ok": False, "error": "not_found"})
          return
        try:
          length = int(self.headers.get("Content-Length", "0"))
        except ValueError:
          length = 0
        raw = self.rfile.read(length) if length > 0 else b"{}"
        try:
          payload = json.loads(raw.decode("utf-8"))
        except Exception:
          self._send_json(400, {"ok": False, "error": "invalid_json"})
          return

        ts = datetime.now(timezone.utc).strftime("%Y%m%dT%H%M%SZ")
        out = REPORTS / f"ota-report-{ts}.json"
        with out.open("w", encoding="utf-8") as f:
          json.dump(payload, f, ensure_ascii=True, indent=2)

        self._send_json(200, {"ok": True, "stored": out.name})

    def main():
      port = 8080
      srv = ThreadingHTTPServer(("0.0.0.0", port), Handler)
      srv.serve_forever()

    if __name__ == "__main__":
      main()
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ota-artifacts-pvc
  namespace: mobile-ota
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-apps
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ota-api
  namespace: mobile-ota
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ota-api
  template:
    metadata:
      labels:
        app: ota-api
    spec:
      containers:
        - name: ota-api
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-lc"]
          args:
            - "python /config/server.py"
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: artifacts
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
      volumes:
        - name: config
          configMap:
            name: ota-api-config
        - name: artifacts
          persistentVolumeClaim:
            claimName: ota-artifacts-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ota-api
  namespace: mobile-ota
spec:
  selector:
    app: ota-api
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ota-api-srv
  namespace: mobile-ota
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`ota.srv.planetonyx.net`)
      kind: Rule
      services:
        - name: ota-api
          port: 8080
  tls:
    secretName: wildcard-srv-planetonyx-net-tls
